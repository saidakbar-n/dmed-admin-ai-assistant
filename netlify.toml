# ─────────────────────────────────────────────────────────────────────────────
# Netlify deployment config for DMED Admin AI Assistant
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Vite outputs to dist/ by default
  publish = "dist"
  command = "npm run build"

[build.environment]
  # Node version — use 20 (LTS)
  NODE_VERSION = "20"

# ── Dev server (used by `netlify dev`) ───────────────────────────────────────
[dev]
  command   = "npm run dev"
  port      = 5173
  targetPort = 5173

# ── SPA routing — redirect all paths to index.html ───────────────────────────
# Without this, refreshing on any sub-path returns 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "microphone=(self)"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
