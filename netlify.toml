[build]
  base    = "admin-ai-assistant"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command    = "npm run dev"
  port       = 5173
  targetPort = 5173

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "microphone=(self)"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"